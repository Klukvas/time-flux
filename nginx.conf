events {
    worker_connections 1024;
}

http {
    # ── MIME types ─────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Shared proxy settings ──────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Proxy timeouts ─────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # ── Client limits ──────────────────────────────────────────────
    client_max_body_size    5m;
    client_body_buffer_size 16k;

    # ── Gzip compression ──────────────────────────────────────────
    gzip              on;
    gzip_min_length   256;
    gzip_types        text/html application/json text/css application/javascript image/svg+xml;
    gzip_vary         on;

    # ── Rate limiting zones ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Cloudflare Origin Certificate (mounted from host)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "0" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

        # ── Auth rate limiting (extra layer; backend @Throttle is primary) ──
        location /api/v1/auth/login {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://backend:3000;
        }

        location /api/v1/auth/register {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://backend:3000;
        }

        # ── API ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend:3000;
        }

        # ── Next.js immutable static assets ───────────────────────
        # NOTE: add_header in a location block clears inherited server-level
        # headers, so security headers must be repeated here.
        location /_next/static/ {
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff" always;
            add_header X-Frame-Options           "DENY" always;
            add_header X-XSS-Protection          "0" always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;

            proxy_pass http://frontend:3000;
        }

        # ── Next.js optimised images ──────────────────────────────
        location /_next/image/ {
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff" always;
            add_header X-Frame-Options           "DENY" always;
            add_header X-XSS-Protection          "0" always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
            add_header Cache-Control "public, max-age=86400" always;

            proxy_pass http://frontend:3000;
        }

        # ── Frontend (catch-all) ──────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
        }
    }
}
